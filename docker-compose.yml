services:
  postgres:
    image: postgres:17-bookworm
    container_name: localize-postgres
    environment:
      POSTGRES_DB: localize
      POSTGRES_USER: localize
      POSTGRES_PASSWORD: localize
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U localize -d localize"]
      interval: 10s
      timeout: 5s
      retries: 10

  localize:
    build: .
    container_name: localize
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"
    volumes:
      - ./data:/app/data
    environment:
      PORT: 3001
      DATA_DIR: /app/data
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: localize
      POSTGRES_USER: localize
      POSTGRES_PASSWORD: localize
      SESSION_SECRET: change-me-in-production
      ADMIN_EMAIL: admin@localize.local
      ADMIN_PASSWORD: admin123!

volumes:
  postgres-data:
