services:
  postgres:
    image: postgres:18.3-bookworm
    container_name: localize-postgres
    environment:
      PGDATA: /var/lib/postgresql/18/docker
      POSTGRES_DB: localize
      POSTGRES_USER: localize
      POSTGRES_PASSWORD: localize
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U localize -d localize"]
      interval: 10s
      timeout: 5s
      retries: 10

  localize:
    image: ghcr.io/derdeno/localize:latest
    container_name: localize
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"
    volumes:
      - ./data:/app/data
    environment:
      PORT: 3001
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: localize
      POSTGRES_USER: localize
      POSTGRES_PASSWORD: localize
      SESSION_SECRET: change-me-in-production
      SESSION_COOKIE_SECURE: "false"
      ADMIN_EMAIL: admin@localize.local
      ADMIN_PASSWORD: admin123!

volumes:
  postgres-data:
