name: Docker Publish

on:
  push:
    branches:
      - main
      - dev
      - standalone
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Select ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.ref_name }}" = "dev" ]; then
            echo "git_ref=dev" >> "$GITHUB_OUTPUT"
            echo "tag_prefix=nightly" >> "$GITHUB_OUTPUT"
            echo "extra_tag=${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_name }}" = "standalone" ]; then
            echo "git_ref=standalone" >> "$GITHUB_OUTPUT"
            echo "tag_prefix=standalone" >> "$GITHUB_OUTPUT"
            echo "extra_tag=${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "git_ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "tag_prefix=latest" >> "$GITHUB_OUTPUT"
            echo "extra_tag=${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.git_ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.ref.outputs.extra_tag }}
            type=raw,value=${{ steps.ref.outputs.tag_prefix }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
